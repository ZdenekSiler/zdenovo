# Temporary HTTP-only config used during initial certificate bootstrap.
# Replaced by the HTTPS config once the certificate is issued.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK - certificate bootstrap in progress';
        add_header Content-Type text/plain;
    }
}
