services:
  web:
    build:
      context: .
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
    restart: unless-stopped
    volumes:
      - db_data:/data
    environment:
      - DB_DIR=/data
      - CF_ZONE_ID=${CF_ZONE_ID}
    secrets:
      - anthropic_api_key
      - unsplash_access_key
      - admin_password
      - secret_key
      - cloudflare_api_token
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/app.conf:ro
      - ./nginx/no-default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/static:/app/frontend/static:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renews certificates every 12 hours if due
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  unsplash_access_key:
    file: ./secrets/unsplash_access_key
  admin_password:
    file: ./secrets/admin_password
  secret_key:
    file: ./secrets/secret_key
  cloudflare_api_token:
    file: ./secrets/cloudflare_api_token

networks:
  internal:

volumes:
  db_data:
  certbot_www:
  certbot_conf:
