services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - db_data:/data
    environment:
      - DB_DIR=/data
    secrets:
      - anthropic_api_key
      - unsplash_access_key
      - admin_password
      - secret_key
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/app.conf:ro
      - ./nginx/no-default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renews certificates every 12 hours if due
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  unsplash_access_key:
    file: ./secrets/unsplash_access_key
  admin_password:
    file: ./secrets/admin_password
  secret_key:
    file: ./secrets/secret_key

networks:
  internal:

volumes:
  db_data:
  certbot_www:
  certbot_conf:
